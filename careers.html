<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#132A54" />
<meta name="color-scheme" content="light" />
<title>Careers — WorkSource</title>
<meta name="description" content="Open positions via WorkSource Recruitment. Apply directly online." />
<link rel="stylesheet" href="styles.css" />
<style>
  .hero{background:
    radial-gradient(rgba(255,255,255,.07) 1px, transparent 1.6px),
    radial-gradient(1100px 550px at 85% -10%, rgba(31,134,227,.22), transparent 60%),
    linear-gradient(160deg,#10345F 0%,var(--navy-950) 100%);
    background-size: 26px 26px, auto, auto;
    color:#fff;padding:54px 26px 44px;text-align:center;}
  .hero h1{font-size:32px;color:#fff;}
  .hero p{opacity:.85;max-width:560px;margin:10px auto 0;font-size:14.5px;}
  .hero .tagline{display:inline-block;background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.4);color:var(--orange-500);
    font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 14px;border-radius:9999px;margin-bottom:14px;}
  .jobmeta{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .share{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  footer{padding:30px;text-align:center;color:var(--gray-500);font-size:12.5px;}
  .apply-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:600px){.apply-grid{grid-template-columns:1fr;}.hero h1{font-size:24px;}}
  .hp{position:absolute;left:-9999px;opacity:0;height:0;width:0;}
</style>
</head>
<body>

<div class="hero">
  <div class="tagline">We're hiring</div>
  <h1>Open Positions</h1>
  <p>Roles across Construction/EPC, BFSI, Manufacturing, Healthcare, Pharma and IT — placed by the WorkSource recruitment team. Apply in under a minute.</p>
</div>

<main style="max-width:860px;margin:0 auto;padding:26px;">
  <div id="jobList"><div class="empty">Loading open positions…</div></div>
</main>

<!-- Apply modal -->
<div id="applyBg" class="modal-bg hidden" onclick="if(event.target===this)closeApply()">
  <div class="modal">
    <h3 id="applyTitle">Apply</h3>
    <form id="applyForm" onsubmit="return submitApply(event)">
      <input type="hidden" id="reqId" />
      <input class="hp" id="website" name="website" tabindex="-1" autocomplete="off" />
      <label>Full name *</label>
      <input id="f_name" required maxlength="120" />
      <div class="apply-grid">
        <div><label>Email *</label><input id="f_email" type="email" required maxlength="160" /></div>
        <div><label>Phone</label><input id="f_phone" maxlength="30" /></div>
        <div><label>Current company</label><input id="f_company" maxlength="160" /></div>
        <div><label>Total experience (yrs)</label><input id="f_exp" type="number" step="0.5" min="0" max="50" /></div>
        <div><label>Current CTC (LPA)</label><input id="f_cctc" type="number" step="0.1" min="0" /></div>
        <div><label>Expected CTC (LPA)</label><input id="f_ectc" type="number" step="0.1" min="0" /></div>
        <div><label>Notice period (days)</label><input id="f_notice" type="number" min="0" max="365" /></div>
        <div><label>Location</label><input id="f_loc" maxlength="120" /></div>
      </div>
      <label>LinkedIn URL</label>
      <input id="f_li" maxlength="300" placeholder="https://linkedin.com/in/…" />
      <label>Resume link (Drive/Dropbox, shared)</label>
      <input id="f_resume" maxlength="500" placeholder="https://…" />
      <button class="btn-primary" id="applyBtn" type="submit">Submit application</button>
      <div id="applyErr" class="err"></div>
    </form>
  </div>
</div>

<footer>
  <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:6px;">
    <span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--navy-800),var(--navy-950));color:#fff;font-weight:800;font-size:13px;">H</span>
    <b style="color:var(--navy-900);">HireOS</b>
  </div><br/>
  © WorkSource Recruitment · <a href="index.html">Team login</a>
</footer>

<script>
var API = 'https://xrargvfdummasvaacfko.supabase.co/functions/v1/public-jobs';
var JOBS = [];

function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}

function jobCard(j, i){
  var exp = (j.experience_min!=null||j.experience_max!=null) ? ((j.experience_min||0)+'–'+(j.experience_max||'?')+' yrs') : null;
  var ctc = (j.ctc_min!=null||j.ctc_max!=null) ? ('₹'+(j.ctc_min||'?')+'–'+(j.ctc_max||'?')+' LPA') : null;
  var pageUrl = location.href.split('#')[0] + '#job-' + j.id;
  var shareTxt = encodeURIComponent('We’re hiring: ' + j.title + (j.location? ' in '+j.location : '') + ' — apply here: ' + pageUrl);
  return '<div class="card" id="job-'+esc(j.id)+'">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;">' +
      '<div><div class="req-title">'+esc(j.title)+'</div>' +
      '<div class="jobmeta">' +
        (j.hiring_category?'<span class="stage-pill">'+esc(j.hiring_category)+'</span>':'') +
        (j.segment?'<span class="stage-pill">'+esc(j.segment)+'</span>':'') +
      '</div>' +
      '<div class="meta-row">' + [j.location, exp, ctc, (j.openings||1)+' opening(s)'].filter(Boolean).map(esc).join(' · ') + '</div></div>' +
      '<button class="btn-primary" style="width:auto;margin-top:0;padding:10px 22px;" onclick="openApply('+i+')">Apply</button>' +
    '</div>' +
    '<div class="share">' +
      '<a class="icon-btn" style="text-decoration:none;" target="_blank" rel="noopener" href="https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(pageUrl)+'">in Share</a>' +
      '<a class="icon-btn" style="text-decoration:none;" target="_blank" rel="noopener" href="https://wa.me/?text='+shareTxt+'">WhatsApp</a>' +
      '<a class="icon-btn" style="text-decoration:none;" target="_blank" rel="noopener" href="https://x.com/intent/post?text='+shareTxt+'">X</a>' +
      '<button class="icon-btn" onclick="copyLink(\''+esc(j.id)+'\')">Copy link</button>' +
    '</div></div>';
}

function load(){
  fetch(API).then(function(r){return r.json();}).then(function(d){
    JOBS = d.jobs || [];
    var el = document.getElementById('jobList');
    if(!JOBS.length){ el.innerHTML = '<div class="empty">No open positions right now — check back soon.</div>'; return; }
    el.innerHTML = JOBS.map(jobCard).join('');
    if(location.hash){ var t=document.querySelector(location.hash); if(t){ t.scrollIntoView(); t.style.borderColor='var(--orange-500)'; } }
  }).catch(function(){
    document.getElementById('jobList').innerHTML = '<div class="empty">Could not load positions. Please refresh.</div>';
  });
}

function copyLink(id){
  var url = location.href.split('#')[0] + '#job-' + id;
  (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject()).then(function(){alert('Link copied');},function(){prompt('Copy this link:', url);});
}

function openApply(i){
  var j = JOBS[i];
  document.getElementById('reqId').value = j.id;
  document.getElementById('applyTitle').textContent = 'Apply — ' + j.title;
  document.getElementById('applyErr').textContent = '';
  document.getElementById('applyBg').classList.remove('hidden');
}
function closeApply(){ document.getElementById('applyBg').classList.add('hidden'); }

function submitApply(e){
  e.preventDefault();
  var btn = document.getElementById('applyBtn');
  btn.disabled = true; btn.textContent = 'Submitting…';
  var payload = {
    req_id: document.getElementById('reqId').value,
    website: document.getElementById('website').value,
    full_name: document.getElementById('f_name').value,
    email: document.getElementById('f_email').value,
    phone: document.getElementById('f_phone').value,
    current_company: document.getElementById('f_company').value,
    experience_yrs: document.getElementById('f_exp').value,
    current_ctc: document.getElementById('f_cctc').value,
    expected_ctc: document.getElementById('f_ectc').value,
    notice_period_days: document.getElementById('f_notice').value,
    location: document.getElementById('f_loc').value,
    linkedin_url: document.getElementById('f_li').value,
    resume_url: document.getElementById('f_resume').value
  };
  fetch(API, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)})
    .then(function(r){ return r.json().then(function(d){ return {ok:r.ok, d:d}; }); })
    .then(function(res){
      btn.disabled = false; btn.textContent = 'Submit application';
      if(res.ok && res.d.ok){
        closeApply();
        alert(res.d.duplicate ? 'You have already applied for this position.' : 'Application received! Our team will contact you if shortlisted.');
        document.getElementById('applyForm').reset();
      } else {
        document.getElementById('applyErr').textContent = (res.d && res.d.error) || 'Something went wrong. Please try again.';
      }
    }).catch(function(){
      btn.disabled = false; btn.textContent = 'Submit application';
      document.getElementById('applyErr').textContent = 'Network error. Please try again.';
    });
  return false;
}

load();
</script>
</body>
</html>
